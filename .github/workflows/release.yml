name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  sync-pricing:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Sync pricing.json into wrapper packages
        run: |
          set -euo pipefail
          mkdir -p python/src/relayone_llm_pricing/v1 npm/v1
          cp v1/pricing.json python/src/relayone_llm_pricing/v1/pricing.json
          cp v1/pricing.json npm/v1/pricing.json
      - name: Upload synced tree
        uses: actions/upload-artifact@v4
        with:
          name: synced-tree
          path: .
          include-hidden-files: true

  smoke-go:
    needs: sync-pricing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Go build + test
        run: |
          go build ./...
          go test -count=1 ./...

  publish-pypi:
    needs: sync-pricing
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for trusted publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: synced-tree
          path: .
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build distribution
        working-directory: python
        run: python -m build
      - name: Verify version matches tag
        working-directory: python
        run: |
          TAG="${{ needs.sync-pricing.outputs.tag }}"
          VERSION="${TAG#v}"
          grep -E "^version = \"${VERSION}\"$" pyproject.toml || (echo "pyproject.toml version != tag ${VERSION}" && exit 1)
      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  publish-npm:
    needs: sync-pricing
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # provenance
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: synced-tree
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Verify version matches tag
        working-directory: npm
        run: |
          TAG="${{ needs.sync-pricing.outputs.tag }}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          test "$PKG_VERSION" = "$VERSION" || (echo "package.json version $PKG_VERSION != tag $VERSION" && exit 1)
      - name: Install deps (omit dev, skip scripts)
        working-directory: npm
        run: npm ci --ignore-scripts
      - name: Publish with provenance
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
